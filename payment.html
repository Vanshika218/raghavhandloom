<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payment - Raghav Handloom</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fdfaf6;
      padding: 2rem;
    }
    h2 {
      text-align: center;
      color: #333;
    }
    .payment-options {
      max-width: 500px;
      margin: 2rem auto;
      background: #fff;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .option {
      margin: 1rem 0;
    }
    .option input {
      margin-right: 10px;
    }
    button {
      background-color: green;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 1rem;
      width: 100%;
    }
  </style>
</head>
<body>

<h2>Select Payment Method</h2>
<div class="payment-options">
  <div class="option">
    <input type="radio" name="payment" id="razorpay" checked>
    <label for="razorpay">Razorpay</label>
  </div>
  <div class="option">
    <input type="radio" name="payment" id="gpay">
    <label for="gpay">Google Pay</label>
  </div>
  <div class="option">
    <input type="radio" name="payment" id="phonepe">
    <label for="phonepe">PhonePe</label>
  </div>
  <div class="option">
    <input type="radio" name="payment" id="cod">
    <label for="cod">Cash on Delivery</label>
  </div>
  <button onclick="confirmPayment()">Confirm Payment</button>
</div>

<script>
  function confirmPayment() {
    alert("Thank you! Your payment method has been selected.");
    window.location.href = "index2.html"; // redirect to homepage
  }
</script>

</body>
</html>
