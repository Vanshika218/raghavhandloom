<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign Up - Raghav Handloom</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fdfaf6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .form-box {
      background: #fff;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      border: none;
      border-radius: 6px;
      background-color: #333;
      color: white;
      cursor: pointer;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<div class="form-box">
  <h2>Sign Up</h2>
  <input type="text" id="name" placeholder="Full Name" required />
  <input type="email" id="email" placeholder="Email" required />
  <input type="text" id="phone" placeholder="Phone Number" required />
  <button onclick="sendOTP()">Send OTP</button>

  <div id="otpSection" class="hidden">
    <input type="text" id="otp" placeholder="Enter OTP" />
    <button onclick="verifyOTP()">Verify OTP & Sign Up</button>
  </div>
</div>

<script>
  let generatedOTP = '';

  function sendOTP() {
    const phone = document.getElementById('phone').value.trim();
    if (!/^[6-9]\d{9}$/.test(phone)) {
      alert("Enter a valid 10-digit Indian phone number.");
      return;
    }
    generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
    alert("OTP sent to your phone: " + generatedOTP); // Simulating SMS
    document.getElementById('otpSection').classList.remove('hidden');
  }

  function verifyOTP() {
    const enteredOTP = document.getElementById('otp').value.trim();
    if (enteredOTP === generatedOTP) {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();

      localStorage.setItem('user', JSON.stringify({ name, email, phone }));
      alert("Signup successful!");
      window.location.href = "profile.html";
    } else {
      alert("Invalid OTP. Please try again.");
    }
  }
</script>

</body>
</html>
