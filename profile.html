<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile - Raghav Handloom</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #fdfaf6;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .profile-card {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      max-width: 500px;
      width: 100%;
      text-align: center;
    }

    h2 {
      color: #333;
      margin-bottom: 1rem;
    }

    .profile-info p {
      margin: 0.5rem 0;
    }

    .action-buttons {
      margin-top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .action-buttons a, .action-buttons button {
      text-decoration: none;
      padding: 10px;
      background-color: #b97b56;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      transition: background 0.3s;
      cursor: pointer;
    }

    .action-buttons a:hover,
    .action-buttons button:hover {
      background-color: #a76944;
    }

    textarea {
      width: 100%;
      margin-top: 1rem;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      resize: vertical;
    }

    .review-section {
      margin-top: 2rem;
      text-align: left;
    }

    .review-section ul {
      list-style-type: none;
      padding: 0;
    }

    .review-section li {
      background: #f4f4f4;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
    }

    .review-section li strong {
      color: #333;
    }

    #loginRedirect {
      margin-top: 1.5rem;
      background-color: #007bff;
    }

    #loginRedirect:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

<div class="profile-card" id="profileCard">
  <h2>Your Profile</h2>
  <div class="profile-info" id="profileData"></div>

  <!-- Review Section -->
  <div class="review-section" id="reviewSection" style="display: none;">
    <h3>Leave a Review</h3>
    <textarea id="reviewText" rows="3" placeholder="Write your review..."></textarea>
    <button onclick="submitReview()">Submit Review</button>

    <button onclick="toggleReviews()">All Reviews</button>
<div id="allReviews" style="display: none;">
  <h3>All Reviews</h3>
  <ul id="reviewList"></ul>
</div>
  <!-- Action Buttons -->
  <div class="action-buttons" id="profileButtons" style="display: none;">
        <button onclick="logout()">🔓 Logout</button>
  </div>

  <!-- Show this only if not logged in -->
  <div class="action-buttons" id="loginButtons" style="display: none;">
    <button id="loginRedirect" onclick="goToSignup()">🔐 Login / Sign Up</button>
  </div>
</div>

<script>
  const user = JSON.parse(localStorage.getItem('user'));
if (user) {
  localStorage.setItem("userProfile", JSON.stringify(user));
}
  const profileDiv = document.getElementById('profileData');
  const reviewSection = document.getElementById('reviewSection');
  const reviewList = document.getElementById('reviewList');
  const profileButtons = document.getElementById('profileButtons');
  const loginButtons = document.getElementById('loginButtons');

  if (user) {
profileDiv.innerHTML = `
  <p><strong>Name:</strong> ${user.name}</p>
  <p><strong>Email:</strong> ${user.email}</p>
  <p><strong>Phone:</strong> ${user.phone}</p>
`;
    profileButtons.style.display = "flex";
    reviewSection.style.display = "block";
    displayReviews();
  } else {
    profileDiv.innerHTML = "<p>No user information found.</p>";
    loginButtons.style.display = "flex";
  }

  function logout() {
    localStorage.removeItem('user');
    window.location.reload(); // refresh the page
  }

  function goToSignup() {
    window.location.href = "signup.html"; // change if your login/signup page is named differently
  }
function toggleReviews() {
  const reviewDiv = document.getElementById("allReviews");
  if (reviewDiv.style.display === "none") {
    reviewDiv.style.display = "block";
    displayReviews(); // Show reviews when revealed
  } else {
    reviewDiv.style.display = "none";
  }
}
  function submitReview() {
    const reviewText = document.getElementById("reviewText").value.trim();
    if (!user) return alert("Please login to submit a review.");
    if (reviewText === "") return alert("Please write something!");

    let reviews = JSON.parse(localStorage.getItem("reviews")) || [];
    reviews.push({
      user: user.name,
      review: reviewText
    });
    localStorage.setItem("reviews", JSON.stringify(reviews));

    document.getElementById("reviewText").value = "";
    displayReviews();
  }

  function displayReviews() {
    const reviews = JSON.parse(localStorage.getItem("reviews")) || [];
    reviewList.innerHTML = "";

    reviews.forEach((r) => {
      const li = document.createElement("li");
      li.innerHTML = `<strong>${r.user}:</strong> ${r.review}`;
      reviewList.appendChild(li);
    });
  }
</script>

</body>
</html>
